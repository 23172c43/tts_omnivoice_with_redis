# ============================================================
# OmniVoice TTS — Docker Compose
# ============================================================
# Services:
#   redis       — Celery broker + backend
#   tts_api     — FastAPI server (port 8989)
#   tts_worker  — Celery worker (GPU 1, /dev/shm)
# ============================================================

services:
  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  tts_api:
    build: .
    image: omnivoice-tts:latest
    restart: always
    ports:
      - "8989:8989"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PORT=8989
      - MODEL_DIR=/app/local_models/k2-fsa/OmniVoice
    volumes:
      - ./local_models:/app/local_models
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8989/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  tts_worker:
    build: .
    image: omnivoice-tts:latest
    restart: unless-stopped
    runtime: nvidia
    command: celery -A app.worker.celery_app worker --loglevel=info -c 1
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MODEL_DIR=/app/local_models/k2-fsa/OmniVoice
      - NVIDIA_VISIBLE_DEVICES=1
    volumes:
      - ./local_models:/app/local_models
      - /dev/shm/audio:/dev/shm/audio
    shm_size: 256mb
    depends_on:
      redis:
        condition: service_healthy
